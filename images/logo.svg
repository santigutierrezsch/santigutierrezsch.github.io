<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background for better visibility -->
  <rect x="0" y="0" width="32" height="32" rx="6" fill="#FFFFFF"/>
  
  <!-- "S." Text - larger and thicker with white outline -->
  <text 
    x="16" 
    y="23" 
    font-family="'Space Grotesk', sans-serif" 
    font-size="24" 
    font-weight="900" 
    text-anchor="middle" 
    fill="#000000"
    stroke="#FFFFFF"
    stroke-width="1"
    paint-order="stroke fill">S.</text>
    
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&amp;display=swap');
  </style>
</svg>
